<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body >

    <div class="container my-4 d-flex justify-content-between align-items-center">
        <a href="index.html" class="btn btn-sm btn-outline-dark rounded-pill px-3">← Back to Home</a>
        <h4 class="fw-bold m-0" style="color: rgb(245, 7, 114);">Tala's Coding Blog</h4>
    </div>

    <div class="container mb-5">
        <div class="text-center my-5">
            <h1 class="display-5 fw-bold mb-2 ">Technical Articles & Insights</h1>
            <p class="text-muted lead">A comprehensive archive of my software engineering notes (<span class="fw-bold text-dark">34 Articles</span>).</p>
        </div>

        <div class="row g-4" id="blogContainer">
        </div>
    </div>

    <div class="modal fade" id="blogModal" tabindex="-1" aria-labelledby="blogModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold fs-4 text-dark" id="blogModalTitle">Article Title</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-4 pb-4">
                    <p id="blogModalContent" class="text-secondary lh-lg fs-6"></p>
                </div>
                <div class="modal-footer border-0 px-4 pb-4">
                    <button type="button" class="btn text-white w-100 rounded-3 py-2" data-bs-dismiss="modal" style="background-color: rgb(245, 7, 114);">Done Reading</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = ["Web Dev", "AI & ML", "Database", "UI/UX", "Cybersecurity", "Software Architecture"];
        const badgesColors = ["danger", "primary", "success", "warning", "info", "dark"];

        const container = document.getElementById('blogContainer');

        for (let i = 1; i <= 34; i++) {
            const catIndex = i % categories.length;
            const category = categories[catIndex];
            const color = badgesColors[catIndex];
            
            const day = String((i * 3) % 28 + 1).padStart(2, '0');
            const dateStr = `June ${day}, 2026`;
            
            const title = `Article #${i}: Advanced Systems & ${category} Concepts`;
            const shortDesc = `Exploring foundational module ${i} and structural implementation principles of modern computer science within the field of ${category}.`;
            const fullContent = `This is the full comprehensive text for article number ${i} specialized in ${category}. Engineering scalable systems requires core execution cycles, systematic database normalizations, and regular performance analysis. In this detailed review, we deep-dive into how architectural frameworks optimize latency and enhance data verification workflows under continuous integration environments.`;

            const cardHTML = `
                <div class="col-12 col-md-6 col-xl-4">
                    <div class="card h-100 shadow-sm border-0 rounded-4 p-2">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <div>
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="badge bg-${color}-subtle text-${color} rounded-pill px-3 fs-7">${category}</span>
                                    <small class="text-muted">${dateStr}</small>
                                </div>
                                <h5 class="card-title fw-bold text-dark mt-2">${title}</h5>
                                <p class="card-text text-secondary fs-7 mt-2">${shortDesc}</p>
                            </div>
                            <button class="btn btn-outline-dark btn-sm w-100 mt-4 rounded-3 py-2 read-more-btn" 
                                    data-title="${title}" 
                                    data-content="${fullContent}">
                                Read More →
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML += cardHTML;
        }

        const blogModalElement = document.getElementById('blogModal');
        const bootstrapModal = new bootstrap.Modal(blogModalElement);
        const modalTitle = document.getElementById('blogModalTitle');
        const modalContent = document.getElementById('blogModalContent');

        container.addEventListener('click', function(e) {
            const button = e.target.closest('.read-more-btn');
            if (button) {
                const titleText = button.getAttribute('data-title');
                const contentText = button.getAttribute('data-content');

                modalTitle.innerText = titleText;
                modalContent.innerText = contentText;

                bootstrapModal.show();
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

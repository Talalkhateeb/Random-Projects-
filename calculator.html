<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body { background-color: #fff5f8; min-height: 100vh; display: flex; flex-direction: column; }
        .calc-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .calculator { background: white; border-radius: 2rem; box-shadow: 0 20px 60px rgba(245,7,114,0.15); padding: 1.8rem; width: 100%; max-width: 360px; }
        .display { background: #1a1a2e; border-radius: 1rem; padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; min-height: 90px; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; }
        #expression { color: #9ca3af; font-size: 0.85rem; min-height: 20px; word-break: break-all; }
        #display { color: white; font-size: 2.4rem; font-weight: 700; word-break: break-all; line-height: 1.2; }
        .btn-calc { border-radius: 0.9rem; font-size: 1.2rem; font-weight: 600; padding: 0.85rem; border: none; transition: transform 0.1s, box-shadow 0.1s; }
        .btn-calc:active { transform: scale(0.94); }
        .btn-num { background: #f3f4f6; color: #1f2937; }
        .btn-num:hover { background: #e5e7eb; }
        .btn-op { background: #ffe0ef; color: rgb(245,7,114); }
        .btn-op:hover { background: #ffc0d8; }
        .btn-eq { background: rgb(245,7,114); color: white; }
        .btn-eq:hover { background: #c0005a; }
        .btn-clear { background: #374151; color: white; }
        .btn-clear:hover { background: #1f2937; }
        .btn-zero { grid-column: span 2; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; }
    </style>
</head>
<body>

<div class="container pt-4 pb-2">
    <div class="d-flex justify-content-between align-items-center">
        <a href="index.html" class="btn btn-sm btn-outline-dark rounded-pill px-3">← Back</a>
        <h5 class="fw-bold m-0" style="color:rgb(245,7,114)">🧮 Calculator</h5>
        <div style="width:80px"></div>
    </div>
</div>

<main class="calc-wrapper">
    <div class="calculator">
        <div class="display">
            <div id="expression"></div>
            <div id="display">0</div>
        </div>
        <div class="calc-grid">
            <button class="btn-calc btn-clear" id="btnClear">AC</button>
            <button class="btn-calc btn-clear" id="btnToggle">+/−</button>
            <button class="btn-calc btn-clear" id="btnPercent">%</button>
            <button class="btn-calc btn-op" data-op="/">÷</button>

            <button class="btn-calc btn-num" data-num="7">7</button>
            <button class="btn-calc btn-num" data-num="8">8</button>
            <button class="btn-calc btn-num" data-num="9">9</button>
            <button class="btn-calc btn-op" data-op="*">×</button>

            <button class="btn-calc btn-num" data-num="4">4</button>
            <button class="btn-calc btn-num" data-num="5">5</button>
            <button class="btn-calc btn-num" data-num="6">6</button>
            <button class="btn-calc btn-op" data-op="-">−</button>

            <button class="btn-calc btn-num" data-num="1">1</button>
            <button class="btn-calc btn-num" data-num="2">2</button>
            <button class="btn-calc btn-num" data-num="3">3</button>
            <button class="btn-calc btn-op" data-op="+">+</button>

            <button class="btn-calc btn-num btn-zero" data-num="0">0</button>
            <button class="btn-calc btn-num" data-num=".">.</button>
            <button class="btn-calc btn-eq" id="btnEquals">=</button>
        </div>
    </div>
</main>

<footer class="text-center py-3 text-muted small">
    &copy; 2026 Tala Al-Khateeb
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
    const display = document.getElementById('display');
    const expression = document.getElementById('expression');

    let currentVal = '0';
    let prevVal = null;
    let operator = null;
    let shouldReset = false;
    let exprStr = '';

    function updateDisplay(val) {
        // Format large numbers nicely
        let num = parseFloat(val);
        if (!isNaN(num) && val.toString().length > 10) {
            display.textContent = num.toPrecision(8);
        } else {
            display.textContent = val;
        }
    }

    // Number buttons
    document.querySelectorAll('[data-num]').forEach(btn => {
        btn.addEventListener('click', function () {
            const digit = this.dataset.num;
            if (shouldReset) { currentVal = ''; shouldReset = false; }
            if (digit === '.' && currentVal.includes('.')) return;
            if (currentVal === '0' && digit !== '.') currentVal = digit;
            else currentVal += digit;
            updateDisplay(currentVal);
        });
    });

    // Operator buttons
    document.querySelectorAll('[data-op]').forEach(btn => {
        btn.addEventListener('click', function () {
            const op = this.dataset.op;
            const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
            if (prevVal !== null && !shouldReset) calculate();
            prevVal = currentVal;
            operator = op;
            exprStr = `${currentVal} ${opSymbols[op]}`;
            expression.textContent = exprStr;
            shouldReset = true;
        });
    });

    function calculate() {
        if (prevVal === null || operator === null) return;
        const a = parseFloat(prevVal);
        const b = parseFloat(currentVal);
        let result;
        const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
        expression.textContent = `${prevVal} ${opSymbols[operator]} ${currentVal} =`;
        switch (operator) {
            case '+': result = a + b; break;
            case '-': result = a - b; break;
            case '*': result = a * b; break;
            case '/': result = b === 0 ? 'Error' : a / b; break;
        }
        currentVal = result === 'Error' ? 'Error' : String(parseFloat(result.toFixed(10)));
        updateDisplay(currentVal);
        prevVal = null;
        operator = null;
        shouldReset = true;
    }

    document.getElementById('btnEquals').addEventListener('click', calculate);

    document.getElementById('btnClear').addEventListener('click', () => {
        currentVal = '0'; prevVal = null; operator = null; shouldReset = false; exprStr = '';
        display.textContent = '0'; expression.textContent = '';
    });

    document.getElementById('btnToggle').addEventListener('click', () => {
        currentVal = String(parseFloat(currentVal) * -1);
        updateDisplay(currentVal);
    });

    document.getElementById('btnPercent').addEventListener('click', () => {
        currentVal = String(parseFloat(currentVal) / 100);
        updateDisplay(currentVal);
    });

    // Keyboard support
    document.addEventListener('keydown', e => {
        if (e.key >= '0' && e.key <= '9') document.querySelector(`[data-num="${e.key}"]`)?.click();
        else if (e.key === '.') document.querySelector('[data-num="."]')?.click();
        else if (['+', '-', '*', '/'].includes(e.key)) document.querySelector(`[data-op="${e.key}"]`)?.click();
        else if (e.key === 'Enter' || e.key === '=') document.getElementById('btnEquals').click();
        else if (e.key === 'Escape') document.getElementById('btnClear').click();
        else if (e.key === '%') document.getElementById('btnPercent').click();
    });
</script>
</body>
</html>
